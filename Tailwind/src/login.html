<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page using Tailwind!!!</title>
    <link rel="stylesheet" href="./output.css"/>
</head>
<body class="bg-black flex justify-center items-center min-h-screen">
    <div class="bg-slate-500  rounded-xl p-10 shadow-lg max-w-sm w-full">
        <h1 class="text-center font-bold text-4xl mb-8">Login</h1>
        <form>
            <div class="mb-5">
                <label class="text-lg font-medium">Email Address</label>
                <input class="text-gray-400 px-3 py-1 w-full rounded-lg bg-black" type="email" placeholder="Enter your Eamil">
            </div>
            <div>
                <label class="text-lg font-medium for="">Password</label>
                <input class="text-gray-400 px-3 py-1 w-full rounded-lg bg-black type="password" placeholder="Enter your Password">
            </div>
            <button class="bg-black text-gray-400 w-full mt-5 px-3 py-1 rounded-lg text-center" type="submit">Login</button>
        </form>
    </div>
</body>
</html>
